kind = "mobile"
previewPath = "/sms-gateway-app/"
title = "SMS Gateway App"
version = "1.0.0"
id = "artifacts/sms-gateway-app"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/sms-gateway-app/" ]
localPort = 23579

[services.development]
run = "pnpm --filter @workspace/sms-gateway-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sms-gateway-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sms-gateway-app", "run", "serve" ]

[services.env]
PORT = "23579"
BASE_PATH = "/sms-gateway-app/"
